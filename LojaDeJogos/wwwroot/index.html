<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loja de Jogos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-dark text-white p-4">

    <h1 class="mb-4">🎮 Loja de Jogos</h1>

    <!-- ALERTA -->
    <div id="alerta" class="alert d-none" role="alert"></div>

    <!-- FORMULÁRIO -->
    <div class="card bg-secondary mb-4 p-3">
        <h5 class="mb-3">Cadastrar Jogo</h5>
        <div class="row g-2">
            <div class="col-md-6">
                <input id="titulo" type="text" class="form-control" placeholder="Título *" />
            </div>
            <div class="col-md-6">
                <input id="desenvolvedora" type="text" class="form-control" placeholder="Desenvolvedora *" />
            </div>
            <div class="col-md-4">
                <select id="genero" class="form-select">
                    <option value="">Gênero *</option>
                    <option>Ação</option>
                    <option>Aventura</option>
                    <option>RPG</option>
                    <option>Esporte</option>
                    <option>Corrida</option>
                    <option>Estratégia</option>
                    <option>Simulação</option>
                    <option>Terror</option>
                    <option>Puzzle</option>
                    <option>Luta</option>
                </select>
            </div>
            <div class="col-md-4">
                <select id="plataforma" class="form-select">
                    <option value="">Plataforma *</option>
                    <option>PC</option>
                    <option>PlayStation 5</option>
                    <option>PlayStation 4</option>
                    <option>Xbox Series X</option>
                    <option>Xbox One</option>
                    <option>Nintendo Switch</option>
                    <option>Mobile</option>
                </select>
            </div>
            <div class="col-md-4">
                <input id="ano" type="number" class="form-control" placeholder="Ano *" />
            </div>
            <div class="col-md-4">
                <input id="preco" type="number" class="form-control" placeholder="Preço R$ *" step="0.01" />
            </div>
            <div class="col-md-4">
                <input id="estoque" type="number" class="form-control" placeholder="Estoque *" />
            </div>
            <div class="col-12">
                <button class="btn btn-success px-4" onclick="cadastrarJogo()">
                    <span id="spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                    Cadastrar
                </button>
                <button class="btn btn-outline-light ms-2" onclick="limpar()">Limpar</button>
            </div>
        </div>
    </div>

    <!-- TABELA -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5>Catálogo</h5>
        <button class="btn btn-outline-info btn-sm" onclick="carregarJogos()">↻ Atualizar</button>
    </div>
    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Título</th>
                    <th>Gênero</th>
                    <th>Plataforma</th>
                    <th>Desenvolvedora</th>
                    <th>Ano</th>
                    <th>Preço</th>
                    <th>Estoque</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
